    <script>
        let estudos = [];
        let livros = [];
        let quiz = [];
        let score = 0;
        let currentQuestionIndex = 0;

        // Função para carregar os JSONs
        async function loadBooks() {
            const response = await fetch('livros.json');
            livros = await response.json();
        }

        async function loadQuiz() {
            const response = await fetch('quiz.json');
            quiz = await response.json();
            displayQuestion();
        }

        function displayQuestion() {
            const questionContainer = document.getElementById("questionContainer");
            const currentQuestion = quiz[currentQuestionIndex];
            questionContainer.innerHTML = `
                <div class="question">${currentQuestion.pergunta}</div>
                ${currentQuestion.opcoes.map((opcao, index) => `
                    <button onclick="checkAnswer('${opcao}')">${opcao}</button>
                `).join('')}
            `;
        }

        function checkAnswer(selectedOption) {
            const currentQuestion = quiz[currentQuestionIndex];
            if (selectedOption === currentQuestion.resposta_correta) {
                score++;
            }
            currentQuestionIndex++;
            if (currentQuestionIndex < quiz.length) {
                displayQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const questionContainer = document.getElementById("questionContainer");
            questionContainer.innerHTML = `
                <div class="result">Você acertou ${score} de ${quiz.length} perguntas!</div>
                <button onclick="resetQuiz()">Reiniciar Quiz</button>
            `;
        }

        function resetQuiz() {
            score = 0;
            currentQuestionIndex = 0;
            displayQuestion();
        }

        function searchBook() {
            const input = document.getElementById("bookSearch").value.toLowerCase().trim();
            const foundBook = livros.find(book => book.titulo.toLowerCase() === input);
            if (foundBook) {
                window.location.href = foundBook.url;
            } else {
                alert('Livro não encontrado. Tente novamente.');
            }
        }

        // Chama as funções de carregar ao carregar a página
        window.onload = async () => {
            await loadBooks();
            await loadQuiz();
        };
//adaptado

});

function exibirListaEstudos(data) {
    const estudosDiv = document.getElementById('estudos');
    estudosDiv.innerHTML = ''; // Limpa a área de estudos

    data.forEach(estudo => {
        const link = document.createElement('a');
        link.href = `#estudo-${estudo.id}`;
        link.innerText = estudo.titulo;
        link.onclick = () => mostrarEstudo(estudo);
        
        estudosDiv.appendChild(link);
        estudosDiv.appendChild(document.createElement('br'));

}

// Carrega os dados do JSON
        if ('serviceWorker' in navigator) {

            }
